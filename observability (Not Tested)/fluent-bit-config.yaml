apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: observability
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Daemon       Off
        Log_Level    debug
        Parsers_File parsers.conf

    # =========================================
    # INPUTS
    # =========================================

    # Logs from Kubernetes containers
    [INPUT]
        Name        tail
        Path                /var/log/pods/*/*/*.log
        Exclude_Path        /var/log/pods/observability_*/*/*.log
        Tag                 kube.*
        Parser              docker
        DB                  /var/log/flb_kube.db
        Mem_Buf_Limit       20MB
        Skip_Long_Lines     On

    # OpenTelemetry input (Receives traces/logs from apps)
    [INPUT]
        Name        opentelemetry
        Tag         traces.*
        Listen      0.0.0.0
        Port        4318

    # =========================================
    # FILTERS
    # =========================================

    # Add Kubernetes metadata to logs
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_Tag_Prefix     kube.var.log.pods.
        Regex_Parser        k8s-tag-parser
        Merge_Log           On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    # Flatten the kubernetes metadata to make it OTLP attribute friendly
    [FILTER]
        Name          nest
        Match         kube.*
        Operation     lift
        Nested_under  kubernetes
        Add_prefix    k8s.

    # =========================================
    # OUTPUTS
    # =========================================

    # Forward to OTEL Collector using Fluent Forward protocol
    # This is often more reliable than OTLP for preserving all metadata
    [OUTPUT]
        Name          forward
        Match         *
        Host          otel-collector.observability.svc.cluster.local
        Port          24224

    # Expose Prometheus metrics for scraping by Prometheus server
    [OUTPUT]
        Name        prometheus_exporter
        Match       metrics.*
        Host        0.0.0.0
        Port        9999

    # Debug: Print everything to stdout
    [OUTPUT]
        Name        stdout
        Match       *


  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L

    [PARSER]
        Name        k8s-tag-parser
        Format      regex
        Regex       ^(?<namespace_name>[^_]+)_(?<pod_name>[^_]+)_(?<uid>[a-f0-9\-]+)\.(?<container_name>[^\.]+)\.(?<stream>\d+)\.log$
