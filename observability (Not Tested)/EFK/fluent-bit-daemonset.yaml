apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: efk
  labels:
    k8s-app: fluent-bit
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit
  template:
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: fluent-bit
      namespace: efk
      labels:
        k8s-app: fluent-bit
    spec:
      selector:
        matchLabels:
          k8s-app: fluent-bit
      template:
        metadata:
          labels:
            k8s-app: fluent-bit
        spec:
          serviceAccountName: fluent-bit
          tolerations:
            - operator: "Exists"
          containers:
            - name: fluent-bit
              image: fluent/fluent-bit:1.9.6
              imagePullPolicy: IfNotPresent
              args:
                - -c
                - /fluent-bit/config/fluent-bit.conf
              volumeMounts:
                - name: varlog
                  mountPath: /var/log
                - name: varlibdockercontainers
                  mountPath: /var/lib/docker/containers
                  readOnly: true
                - name: config
                  mountPath: /fluent-bit/config
              resources:
                requests:
                  memory: "50Mi"
                  cpu: "100m"
          volumes:
            - name: varlog
              hostPath:
                path: /var/log
            - name: varlibdockercontainers
              hostPath:
                path: /var/lib/docker/containers
            - name: config
              configMap:
                name: fluent-bit-config
