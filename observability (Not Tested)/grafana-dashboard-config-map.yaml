apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  app-observability.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "loki-ds"
          },
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "pretifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "title": "Application Logs (Loki)",
          "type": "logs",
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki-ds"
              },
              "editorMode": "code",
              "expr": "{k8s_namespace_name=~\".+\"}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {
            "type": "tempo",
            "uid": "tempo-ds"
          },
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 12
          },
          "id": 2,
          "options": {
            "serviceMap": {
              "datasourceUid": "prometheus"
            }
          },
          "title": "Application Traces (Tempo)",
          "type": "traces",
          "targets": [
            {
              "datasource": {
                "type": "tempo",
                "uid": "tempo-ds"
              },
              "queryType": "traceId",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "",
      "schemaVersion": 38,
      "style": "dark",
      "tags": [],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "App Observability",
      "uid": "app-obs-bh",
      "version": 1,
      "weekStart": ""
    }
