---
    name: Global CI
    
    on:
      workflow_dispatch:
      push:
        branches:
          - Voting-Application
        paths:
          - vote/**
          - worker/**
          - result/**
    
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # DATREE_TOKEN: ${{ secrets.DATREE_TOKEN }}
    
    jobs:
      Setup_application:
        runs-on: ubuntu-latest
        outputs:
          APP: ${{ steps.set-app.outputs.APP }}  # Define job output for APP variable
        steps:
          - name: Checkout code
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
    
          - name: Determine changed paths and set APP variable
            id: set-app
            run: |
              # Get changed files from the latest commit
              CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
              
              # Check which path has changes and set APP accordingly
              if echo "$CHANGED_FILES" | grep -q "^vote/"; then
                echo "APP=vote" >> $GITHUB_OUTPUT
              elif echo "$CHANGED_FILES" | grep -q "^worker/"; then
                echo "APP=worker" >> $GITHUB_OUTPUT
              elif echo "$CHANGED_FILES" | grep -q "^result/"; then
                echo "APP=result" >> $GITHUB_OUTPUT
              else
                echo "APP=none" >> $GITHUB_OUTPUT
              fi
    
          - name: Print APP variable
            run: echo "The APP is set to ${{ steps.set-app.outputs.APP }}"
    
      SecurityScan:
        runs-on: ubuntu-latest
        needs: Setup_application
        steps:
          - name: Checkout code
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
    
          - name: Install JAVA latest
            uses: actions/setup-java@v4
            with:
              distribution: 'temurin'
              java-version: '21'
              java-package: 'jdk'
              check-latest: true
    
          - name: OWASP Dependency check
            uses: dependency-check/Dependency-Check_Action@main
            continue-on-error: true
            id: Depcheck
            env:
              JAVA_HOME: /opt/jdk
            with:
              project: 'Call_Booking_app'
              path: '.'
              format: 'HTML'
              out: 'reports'
              args: >
                --failOnCVSS 7
                --enableRetired
    
          - name: Upload artifacts
            uses: actions/upload-artifact@v4
            continue-on-error: true
            with:
              name: OWASP-dependecy-report
              path: './reports/dependency-check-report.html'
    
          - name: Run Trivy vulnerability scanner on filesystem
            uses: aquasecurity/trivy-action@0.28.0
            with:
              scan-type: 'fs'
              ignore-unfixed: true
              format: 'sarif'
              output: 'trivy-results.sarif'
              severity: 'CRITICAL'
    
      build-and-push:
        runs-on: ubuntu-latest
        needs: [Setup_application, SecurityScan]  # Depend on Setup_application for APP variable
        steps:
          - name: Checkout code
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
    
          - name: Docker login
            run: |
              docker login -u "${{ vars.DOCKER_USERNAME }}" -p "${{ secrets.DOCKERHUB_PASS }}"
    
          - name: Docker Build
            run: docker build -t ${{ needs.Setup_application.outputs.APP }} ./${{ needs.Setup_application.outputs.APP }}
    
          - name: Run Trivy vulnerability scanner on Docker image
            uses: aquasecurity/trivy-action@0.28.0
            continue-on-error: true
            with:
              image-ref: '${{ needs.Setup_application.outputs.APP }}'
              format: 'table'
              exit-code: '1'
              ignore-unfixed: true
              vuln-type: 'os,library'
              severity: 'CRITICAL,HIGH'
    
          - name: Build and Push Admin UI image
            run: |
              echo "Building and pushing Admin UI image"
              docker tag ${{ needs.Setup_application.outputs.APP }} ${{ vars.DOCKER_USERNAME }}/${{ needs.Setup_application.outputs.APP }}:v${{ github.run_number }}
              docker push ${{ vars.DOCKER_USERNAME }}/${{ needs.Setup_application.outputs.APP }}:v${{ github.run_number }}
    
      Deploy:
        runs-on: ubuntu-latest
        needs: [Setup_application, build-and-push]  # Depend on Setup_application for APP variable
        steps:
          - name: Checkout code
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
    
          - name: Updating the tag in Manifests for Latest Image
            run: |
              sed -i 's|image:.*|image: ${{ vars.DOCKER_USERNAME }}/${{ needs.Setup_application.outputs.APP }}:v${{ github.run_number }}|g' k8s-specifications/${{ needs.Setup_application.outputs.APP }}-deployment.yaml
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git pull
              git commit -a -m "Updated the Image tag to ${{ github.run_number }}"
              echo "Updated the tag in Manifests for ADMIN UI with Latest Image."
    
          - name: Deploy to Kubernetes
            uses: ad-m/github-push-action@master
            with:
              github_token: ${{ secrets.GIT_TOKEN }}
              branch: ${{ github.ref }}