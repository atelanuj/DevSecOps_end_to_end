name: Terraform Deployment
on:
  push: # Trigger on pus
  workflow_dispatch: # Trigger manually

permissions:
  id-token: write
  contents: read

env:
  VAULT_ADDR: http://3.111.149.232:8200
  VAULT_TOKEN: admin

jobs:
  Terraform_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Terraform/EC2 + VPC + EKS

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Vault
        run: |
          export VAULT_ADDR=${{ env.VAULT_ADDR }}
          vault login ${{ env.VAULT_TOKEN }}

      - name: Get AWS Credentials from Vault
        run: |
          CREDS=$(vault read -format=json aws/creds/ec2-role)
          export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r .data.access_key)
          export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r .data.secret_key)
          export AWS_SESSION_TOKEN=$(echo $CREDS | jq -r .data.security_token)

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

