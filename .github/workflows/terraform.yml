name: Terraform Deployment
on:
  # push: # Trigger on pus
  # workflow_run:
  #   workflows: ["Gitleaks Scan"]
  #   types:
  #     - completed
  workflow_dispatch: # Trigger manually
    inputs:
      Operation:
        description: "Operation to perform"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - plan
          - destroy

permissions:
  id-token: write
  contents: read

env:
  VAULT_ADDR: http://3.111.149.232:8200
  VAULT_TOKEN: admin

jobs:
  Terraform_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Terraform/EC2 + VPC + EKS/ec2

    steps:
      - uses: actions/checkout@v4

      - name: Install Vault CLI
        run: |
          wget -O vault.zip https://releases.hashicorp.com/vault/1.16.1/vault_1.16.1_linux_amd64.zip
          unzip vault.zip
          sudo mv vault /usr/local/bin/

      - name: Authenticate to Vault
        run: |
          export VAULT_ADDR=${{ env.VAULT_ADDR }}
          vault login ${{ env.VAULT_TOKEN }}

      - name: Get AWS Credentials from Vault
        run: |
          CREDS=$(vault read -format=json aws/creds/ec2-role)
          echo "AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r .data.access_key)" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r .data.secret_key)" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$(echo $CREDS | jq -r .data.security_token)" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
        if: github.event.inputs.Operation == 'plan'

      - name: Terraform Apply
        run: terraform apply -auto-approve
        if: github.event.inputs.Operation == 'apply'

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        if: github.event.inputs.Operation == 'destroy'

